name: Update prices & deploy site

on:
  schedule:
    - cron: "37 6 * * *"   # daily, 06:37 UTC (off the :00 rush)
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # A failed fetch (deck source down, API hiccup) must not take the site
      # down - we still redeploy whatever data is already committed.
      - name: Fetch today's prices
        id: fetch
        continue-on-error: true
        run: python fetch_prices.py

      - name: Commit updated data
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add decks data
          if ! git diff --cached --quiet; then
            git commit -m "Daily price snapshot $(date -u +%F)"
            git push
          else
            echo "No data changes today."
          fi

      - name: Report fetch failure
        if: steps.fetch.outcome == 'failure'
        run: echo "::warning::fetch_prices.py failed - deploying previously committed data."

      # Publish to the gh-pages branch (pushing this branch auto-enables
      # GitHub Pages; the Actions token may not create a Pages site via API).
      - name: Deploy to gh-pages
        run: |
          rm -rf /tmp/pub && mkdir /tmp/pub
          cp -r site data index.html /tmp/pub/
          touch /tmp/pub/.nojekyll
          cd /tmp/pub
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy site $(date -u +%FT%TZ)"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            gh-pages
